<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
   <meta 
  name="viewport" 
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" 
/>
    <title>Saviora</title>
    
    <!-- ПОДКЛЮЧЕНИЕ ШРИФТОВ -->
    <!-- Diphylleia (Эфирный), Italiana (Лого-стиль), Nunito (Округлый текст) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Diphylleia&family=Italiana&family=Nunito:wght@200..900&display=swap" rel="stylesheet">

    <!-- TAILWIND CONFIG -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              // Основной текст (аналог SF Pro Rounded)
              sans: ['Nunito', 'sans-serif'],
              // Эфирный шрифт для заголовков (Diphylleia)
              serif: ['Diphylleia', 'serif'],
              // Шрифт для крупных акцентов/лого (аналог Boruna)
              display: ['Italiana', 'serif'],
            },
            colors: {
              background: '#0F0F11',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0F0F11;
        color: white;
        font-family: 'Nunito', sans-serif; /* По умолчанию округлый */
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
